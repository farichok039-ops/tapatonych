<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тапатоныч | Кликер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        *:focus, *:active, button:focus, button:active { outline: none !important; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(145deg, #0a0f1e, #0c1222); min-height: 100vh; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; padding: 20px; color: #eef5ff; }
        .app-container { max-width: 1400px; width: 100%; background: rgba(10,20,30,0.55); backdrop-filter: blur(12px); border-radius: 3rem; padding: 1.5rem; border: 1px solid rgba(255,215,0,0.25); }
        .tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .tab-btn { background: rgba(20,30,45,0.8); border: none; padding: 10px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 40px; color: #ccddee; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: linear-gradient(95deg, #f5b042, #ffd966); color: #1a2a3a; box-shadow: 0 5px 15px rgba(255,200,0,0.3); }
        .tab-pane { display: none; animation: fade 0.25s ease; }
        .tab-pane.active-pane { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .game-panel { background: rgba(0,0,0,0.35); border-radius: 2rem; padding: 1.8rem; }
        .stats-grid { display: flex; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.3); border-radius: 1.5rem; padding: 1rem 1.8rem; margin-bottom: 25px; }
        .stat-card { background: #0f172ad9; border-radius: 2rem; padding: 10px 20px; min-width: 140px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #ffdd99; }
        .click-area { display: flex; justify-content: center; margin: 25px 0; }
        .tap-button { background: radial-gradient(circle at 30% 20%, #ffc857, #ff9f1a); width: 220px; height: 220px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 2rem; color: #2c1a0a; border: 3px solid #ffeaac; transition: 0.05s linear; }
        .tap-button:active { transform: scale(0.96); }
        .upgrades-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 18px; margin-top: 20px; }
        .upgrade-card { background: #111a2be0; border-radius: 1.8rem; padding: 1rem; border-left: 6px solid #ffb347; }
        .buy-btn { background: #2a3b4e; border: none; padding: 8px 18px; border-radius: 40px; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; }
        .buy-btn:hover { background: #f5a623; color: #0a0f1e; }
        .top-table { width: 100%; border-collapse: collapse; background: #0e1625b3; border-radius: 1.5rem; overflow: hidden; }
        .top-table th, .top-table td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #ffd96644; }
        .auth-container { max-width: 450px; margin: 20px auto; background: #0b1120cc; padding: 2rem; border-radius: 2rem; }
        .input-field { width: 100%; padding: 14px; margin: 10px 0; background: #1e2a3a; border: 1px solid #ffc85788; border-radius: 60px; color: white; font-size: 1rem; }
        .btn { background: #f5a623; border: none; padding: 12px; border-radius: 60px; font-weight: bold; width: 100%; margin-top: 12px; cursor: pointer; font-size: 1rem; }
        .logout-btn { background: #b13e3e; margin-left: auto; width: auto; padding: 8px 20px; }
        .admin-panel { background: #0a0f1ccc; padding: 1rem; border-radius: 1.5rem; }
        .user-list-admin { max-height: 400px; overflow-y: auto; }
        .toast-msg { position: fixed; bottom: 20px; right: 20px; background: #2c2f3f; padding: 12px 20px; border-radius: 50px; border-left: 5px solid gold; z-index: 1000; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 800px) { .tap-button { width: 160px; height: 160px; font-size: 1.4rem; } .stat-value { font-size: 1.4rem; } }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div id="authSection">
        <div class="auth-container">
            <h2 style="text-align:center;">🍩 ТАПАТОНЫЧ 🍩</h2>
            <p style="text-align:center;">Копия Кликера Тапотолия by Vanok</p>
            <div style="margin-top: 20px;">
                <input type="text" id="loginUsername" class="input-field" placeholder="Логин">
                <input type="password" id="loginPassword" class="input-field" placeholder="Пароль">
                <button class="btn" id="doLoginBtn">Вход</button>
                <hr style="margin: 20px 0; border-color:#ffd96633">
                <input type="text" id="regUsername" class="input-field" placeholder="Новый логин">
                <input type="password" id="regPassword" class="input-field" placeholder="Пароль">
                <input type="password" id="regConfirm" class="input-field" placeholder="Повтор пароля">
                <button class="btn" id="doRegBtn">Регистрация</button>
            </div>
        </div>
    </div>
    <div id="gameSection" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
            <h2>👑 <span id="currentUsername">---</span> | Тапатоныч</h2>
            <button id="logoutBtn" class="btn logout-btn">🚪 Выйти</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="gameTab">🎮 Игра</button>
            <button class="tab-btn" data-tab="topTab">🏆 Топ-100</button>
            <button class="tab-btn" id="adminTabBtn" style="display:none;" data-tab="adminTab">⚙️ Админ панель</button>
        </div>
        <div id="gameTab" class="tab-pane active-pane">
            <div class="game-panel">
                <div class="stats-grid">
                    <div class="stat-card">💰 ОЧКИ<br><span class="stat-value" id="scoreValue">0</span></div>
                    <div class="stat-card">👊 Сила клика<br><span class="stat-value" id="clickDamage">1</span></div>
                    <div class="stat-card">🤖 Авто-урон/с<br><span class="stat-value" id="autoDPS">0</span></div>
                    <div class="stat-card">⚡ Крит<br><span class="stat-value" id="critInfo">0% / x2.0</span></div>
                </div>
                <div class="click-area">
                    <div class="tap-button" id="tapButton">🖱️ ТАП<br>💥</div>
                </div>
                <h3>📈 ПРОКАЧКА</h3>
                <div class="upgrades-grid" id="upgradesContainer"></div>
            </div>
        </div>
        <div id="topTab" class="tab-pane">
            <div class="game-panel">
                <h3>🏅 ЛУЧШИЕ ТАПАТОНЫЧИ (топ 100)</h3>
                <div style="overflow-x: auto;"><table class="top-table" id="top100Table"><thead><tr><th>#</th><th>Игрок</th><th>Очки</th></tr></thead><tbody id="top100Body"></tbody></table></div>
            </div>
        </div>
        <div id="adminTab" class="tab-pane">
            <div class="admin-panel">
                <h3>🛠️ Панель администратора</h3>
                <button id="adminAddAllBtn" class="btn" style="background:#2e5f2e;">➕ Добавить +5000 всем</button>
                <button id="adminResetAllBtn" class="btn" style="background:#8b3c3c;">⚠️ СБРОС ВСЕХ ДАННЫХ (кроме админа)</button>
                <div class="user-list-admin" id="adminUserList"></div>
            </div>
        </div>
    </div>
</div>
<script>
    const STORAGE_KEY = 'TapatonychGameDB';
    let currentUser = null, autoInterval = null, allUsers = {};
    function hashPassword(pwd) { return btoa(pwd + "tapasalt2025"); }
    function saveAllUsers() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allUsers)); }
    function loadAllUsers() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) allUsers = JSON.parse(data);
        else allUsers = {};
        if (!allUsers["farichok"]) {
            allUsers["farichok"] = { passwordHash: hashPassword("123Qwe"), score: 15000, upgrades: { clickPower: { level: 8 }, autoClick: { level: 5 }, crit: { level: 4 } }, isAdmin: true, totalClicks: 0 };
            saveAllUsers();
        }
    }
    function initDefaultUsers() {
        if (!localStorage.getItem(STORAGE_KEY)) {
            let defaultUsers = { "farichok": { passwordHash: hashPassword("123Qwe"), score: 15000, upgrades: { clickPower: { level: 8 }, autoClick: { level: 5 }, crit: { level: 4 } }, isAdmin: true, totalClicks: 0 } };
            for (let i = 1; i <= 10; i++) defaultUsers["Игрок"+i] = { passwordHash: hashPassword("pass"+i), score: Math.floor(Math.random()*5000), upgrades: { clickPower: { level: 1 }, autoClick: { level: 0 }, crit: { level: 0 } }, isAdmin: false, totalClicks: 0 };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultUsers));
        }
    }
    function getUserUpgradeStats(userData) {
        const clickLvl = userData.upgrades?.clickPower?.level || 1;
        const autoLvl = userData.upgrades?.autoClick?.level || 0;
        const critLvl = userData.upgrades?.crit?.level || 0;
        return { clickDamage: clickLvl, autoDPS: autoLvl, critChance: Math.min(0.6, critLvl * 0.01), critMultiplier: 2 + (critLvl * 0.1), clickLvl, autoLvl, critLvl };
    }
    function getUpgradeCost(type, lvl) { return Math.floor({ clickPower:10, autoClick:15, crit:20 }[type] * Math.pow({ clickPower:1.5, autoClick:1.6, crit:1.7 }[type], lvl)); }
    function showToast(msg, col='#ffd966') { let t=document.createElement('div'); t.className='toast-msg'; t.innerText=msg; t.style.borderLeftColor=col; document.body.appendChild(t); setTimeout(()=>t.remove(),1800); }
    function updateTop100Table() {
        let tbody = document.getElementById('top100Body');
        if(!tbody) return;
        let players = Object.keys(allUsers).map(n=>({name:n, score:allUsers[n].score}));
        players.sort((a,b)=>b.score-a.score);
        tbody.innerHTML = '';
        players.slice(0,100).forEach((p,i)=>{
            let r=tbody.insertRow();
            r.insertCell(0).innerText=i+1;
            r.insertCell(1).innerText=p.name+(p.name==='farichok'?' 👑':'');
            r.insertCell(2).innerText=Math.floor(p.score);
            if(p.name===currentUser) r.style.background='#ffd96633';
        });
    }
    function refreshGameUI() {
        if(!currentUser||!allUsers[currentUser]) return;
        let u=allUsers[currentUser], s=getUserUpgradeStats(u);
        document.getElementById('scoreValue').innerText=Math.floor(u.score);
        document.getElementById('clickDamage').innerText=s.clickDamage;
        document.getElementById('autoDPS').innerText=s.autoDPS;
        document.getElementById('critInfo').innerHTML=`${Math.floor(s.critChance*100)}% / x${s.critMultiplier.toFixed(1)}`;
        let cont=document.getElementById('upgradesContainer');
        if(!cont) return;
        let items=[
            {id:'clickPower',name:'💪 Мощь тапа',desc:`+1 урон (сейчас +${s.clickDamage})`,lvl:s.clickLvl},
            {id:'autoClick',name:'🤖 Робот',desc:`+1 урон/сек (сейчас ${s.autoDPS}/сек)`,lvl:s.autoLvl},
            {id:'crit',name:'✨ Крит',desc:`шанс ${Math.floor(s.critChance*100)}% x${s.critMultiplier.toFixed(1)}`,lvl:s.critLvl}
        ];
        cont.innerHTML='';
        for(let it of items){
            let cost=getUpgradeCost(it.id, it.lvl);
            let can=u.score>=cost;
            let div=document.createElement('div'); div.className='upgrade-card';
            div.innerHTML=`<div class="upgrade-title">${it.name} [${it.lvl}]</div><div class="upgrade-desc">${it.desc}</div><div>💰 ${cost}</div><button class="buy-btn" data-upgrade="${it.id}" ${!can?'disabled':''}>КУПИТЬ</button>`;
            cont.appendChild(div);
        }
        document.querySelectorAll('.buy-btn').forEach(btn=>btn.onclick=e=>buyUpgrade(btn.dataset.upgrade));
    }    function buyUpgrade(upId){
        if(!currentUser||!allUsers[currentUser]) return;
        let u=allUsers[currentUser];
        let lvl=u.upgrades[upId]?.level||0;
        if(upId==='clickPower'&&lvl===0) lvl=1;
        let cost=getUpgradeCost(upId,lvl);
        if(u.score>=cost){
            u.score-=cost;
            if(!u.upgrades[upId]) u.upgrades[upId]={level:0};
            u.upgrades[upId].level++;
            saveAllUsers();
            refreshGameUI();
            updateTop100Table();
            showToast('🚀 Улучшено!');
        } else showToast('❌ Не хватает очков!');
    }
    function handleTap(){
        if(!currentUser||!allUsers[currentUser]) return;
        let u=allUsers[currentUser], s=getUserUpgradeStats(u);
        let dmg=s.clickDamage;
        let crit=false;
        if(Math.random()<s.critChance){ dmg=Math.floor(dmg*s.critMultiplier); crit=true; }
        u.score+=dmg;
        saveAllUsers();
        refreshGameUI();
        updateTop100Table();
        showToast(crit?`💥 КРИТ! +${dmg}`:`➕ +${dmg}`, crit?'#ffcc44':'#ddd');
        let tb=document.getElementById('tapButton');
        if(tb){ tb.style.transform='scale(0.94)'; setTimeout(()=>tb.style.transform='',80); }
    }
    function startAutoClicker(){
        if(autoInterval) clearInterval(autoInterval);
        if(!currentUser||!allUsers[currentUser]) return;
        autoInterval=setInterval(()=>{
            if(!currentUser||!allUsers[currentUser]) return;
            let u=allUsers[currentUser], s=getUserUpgradeStats(u);
            if(s.autoDPS>0){ u.score+=s.autoDPS; saveAllUsers(); refreshGameUI(); updateTop100Table(); }
        },1000);
    }
    function renderAdminUserList(){
        let cont=document.getElementById('adminUserList');
        if(!cont||currentUser!=='farichok'){ if(cont) cont.innerHTML='<i>Нет прав</i>'; return; }
        let players=Object.keys(allUsers).map(n=>({name:n,score:allUsers[n].score}));
        players.sort((a,b)=>b.score-a.score);
        cont.innerHTML='';
        players.forEach(p=>{
            let div=document.createElement('div'); div.style.background='#141c2c'; div.style.margin='8px 0'; div.style.padding='12px'; div.style.borderRadius='20px';
            div.innerHTML=`<strong>${p.name}</strong> | 💰 ${Math.floor(p.score)}<div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;"><input type="number" id="scoreEdit_${p.name}" placeholder="Новое кол-во" style="width:120px;"><button class="btn" style="width:auto;" data-admin-edit="${p.name}">Установить</button><button class="btn" style="background:#a03030; width:auto;" data-admin-del="${p.name}">🗑 Удалить</button><button class="btn" style="background:#2e6b2e; width:auto;" data-admin-add="${p.name}">+1000</button></div>`;
            cont.appendChild(div);
        });
        document.querySelectorAll('[data-admin-edit]').forEach(b=>b.onclick=()=>{ let n=b.dataset.adminEdit; let v=parseInt(document.getElementById(`scoreEdit_${n}`).value)||0; if(allUsers[n]){ allUsers[n].score=v; saveAllUsers(); if(currentUser===n) refreshGameUI(); renderAdminUserList(); updateTop100Table(); showToast(`✅ ${n} очки = ${v}`); } });
        document.querySelectorAll('[data-admin-del]').forEach(b=>b.onclick=()=>{ let n=b.dataset.adminDel; if(n==='farichok'){ showToast('❌ Нельзя удалить админа!'); return; } if(allUsers[n]){ delete allUsers[n]; saveAllUsers(); if(currentUser===n) logout(); renderAdminUserList(); updateTop100Table(); showToast(`🗑 ${n} удалён`); } });
        document.querySelectorAll('[data-admin-add]').forEach(b=>b.onclick=()=>{ let n=b.dataset.adminAdd; if(allUsers[n]){ allUsers[n].score+=1000; saveAllUsers(); if(currentUser===n) refreshGameUI(); renderAdminUserList(); updateTop100Table(); showToast(`➕ +1000 для ${n}`); } });
    }
    function adminAddAll(){ if(currentUser==='farichok'){ for(let u in allUsers) allUsers[u].score+=5000; saveAllUsers(); refreshGameUI(); renderAdminUserList(); updateTop100Table(); showToast('✨ Всем +5000!'); } }
    function adminResetAllExceptAdmin(){ if(currentUser==='farichok'){ for(let u in allUsers){ if(u!=='farichok'){ allUsers[u].score=0; allUsers[u].upgrades={clickPower:{level:1},autoClick:{level:0},crit:{level:0}}; } else { allUsers[u].score=15000; allUsers[u].upgrades={clickPower:{level:8},autoClick:{level:5},crit:{level:4}}; } } saveAllUsers(); if(currentUser==='farichok') refreshGameUI(); renderAdminUserList(); updateTop100Table(); showToast('💣 Сброс выполнен'); } }
    function logout(){ if(autoInterval) clearInterval(autoInterval); currentUser=null; document.getElementById('gameSection').style.display='none'; document.getElementById('authSection').style.display='block'; sessionStorage.removeItem('currentUserTap'); }
    function login(username, password){
        if(!allUsers[username]){ showToast('❌ Неверный логин'); return false; }
        if(allUsers[username].passwordHash!==hashPassword(password)){ showToast('❌ Неверный пароль'); return false; }
        currentUser=username;
        sessionStorage.setItem('currentUserTap',username);
        document.getElementById('authSection').style.display='none';
        document.getElementById('gameSection').style.display='block';
        document.getElementById('currentUsername').innerText=username;
        let adminBtn=document.getElementById('adminTabBtn');
        if(username==='farichok') adminBtn.style.display='inline-block'; else adminBtn.style.display='none';
        refreshGameUI(); updateTop100Table();
        if(autoInterval) clearInterval(autoInterval);
        startAutoClicker();
        if(username==='farichok') renderAdminUserList();
        showToast(`✅ Добро пожаловать, ${username}!`);
        return true;
    }
    function register(username, password, confirm){
        if(!username||!password){ showToast('Заполните поля'); return false; }
        if(password!==confirm){ showToast('Пароли не совпадают'); return false; }
        if(allUsers[username]){ showToast('Игрок уже существует'); return false; }
        if(username==='farichok'){ showToast('Это имя зарезервировано'); return false; }
        allUsers[username]={ passwordHash:hashPassword(password), score:0, upgrades:{clickPower:{level:1},autoClick:{level:0},crit:{level:0}}, isAdmin:false, totalClicks:0 };
        saveAllUsers();
        showToast('✅ Регистрация успешна! Войдите.');
        return true;
    }
    window.onload=()=>{
        initDefaultUsers(); loadAllUsers();
        document.getElementById('authSection').style.display='block';
        document.getElementById('gameSection').style.display='none';
        document.getElementById('doLoginBtn').onclick=()=>login(document.getElementById('loginUsername').value.trim(), document.getElementById('loginPassword').value);
        document.getElementById('doRegBtn').onclick=()=>{ let u=document.getElementById('regUsername').value.trim(), p=document.getElementById('regPassword').value, c=document.getElementById('regConfirm').value; if(register(u,p,c)){ document.getElementById('regUsername').value=''; document.getElementById('regPassword').value=''; document.getElementById('regConfirm').value=''; } };
        document.getElementById('logoutBtn').onclick=logout;
        document.getElementById('tapButton').onclick=handleTap;
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.onclick=()=>{ let id=btn.dataset.tab; document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active-pane')); document.getElementById(id).classList.add('active-pane'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(id==='adminTab' && currentUser==='farichok') renderAdminUserList(); if(id==='topTab') updateTop100Table(); });
        document.getElementById('adminAddAllBtn')?.addEventListener('click',adminAddAll);
        document.getElementById('adminResetAllBtn')?.addEventListener('click',adminResetAllExceptAdmin);
        let saved=sessionStorage.getItem('currentUserTap');
        if(saved && allUsers[saved]){ currentUser=saved; document.getElementById('authSection').style.display='none'; document.getElementById('gameSection').style.display='block'; document.getElementById('currentUsername').innerText=saved; if(saved==='farichok') document.getElementById('adminTabBtn').style.display='inline-block'; refreshGameUI(); updateTop100Table(); startAutoClicker(); if(saved==='farichok') renderAdminUserList(); }
    };
</script>
</body>
</html>
